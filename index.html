<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>排班系統</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: Arial, "Microsoft JhengHei", sans-serif; margin: 0; background: #f4f6f8; color: #222; }
    header { background: #2563eb; color: white; padding: 24px 16px; text-align: center; }
    main { max-width: 1200px; margin: 24px auto; padding: 0 16px 40px; }
    .card { background: white; border-radius: 14px; padding: 18px; margin-bottom: 18px; box-shadow: 0 4px 14px rgba(0,0,0,0.08); }
    h1, h2 { margin-top: 0; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    input, select, textarea, button { width: 100%; padding: 10px; margin-top: 6px; border: 1px solid #ccc; border-radius: 8px; font-size: 15px; }
    textarea { min-height: 76px; resize: vertical; }
    button { cursor: pointer; border: none; background: #2563eb; color: white; font-weight: bold; margin-top: 14px; }
    button.secondary { background: #475569; }
    button.danger { background: #dc2626; }
    button:hover { opacity: .9; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(230px, 1fr)); gap: 12px; }
    .employee-list { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 12px; }
    .employee-item { border: 1px solid #e5e7eb; border-radius: 12px; padding: 12px; background: #f8fafc; }
    table { width: 100%; border-collapse: collapse; margin-top: 12px; background: white; }
    th, td { border: 1px solid #d1d5db; padding: 8px; text-align: center; vertical-align: top; }
    th { background: #e0ecff; }
    .holiday { background: #fee2e2; }
    .note { background: #fff7ed; border-left: 5px solid #f97316; padding: 10px; border-radius: 8px; line-height: 1.6; }
    .small { font-size: 13px; color: #555; }
    .actions { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
    .warning { color: #b91c1c; font-weight: bold; }
    @media print { header, .input-area, .actions, .no-print { display: none; } body { background: white; } main { max-width: none; margin: 0; } .card { box-shadow: none; border: none; } }
  </style>
</head>
<body>
  <header>
    <h1>排班系統</h1>
    <p>輸入員工、身分與休假日期，自動產生每月班表</p>
  </header>

  <main>
    <section class="card input-area">
      <h2>1. 設定月份與人數規則</h2>
      <div class="grid">
        <div><label>選擇月份</label><input type="month" id="monthInput" /></div>
        </div>
        <div><label>正職每月休假天數</label><input type="number" id="fulltimeOffDays" value="8" min="0" /></div>
      </div>
      <label>國定假日日期</label>
      <textarea id="nationalHolidays" placeholder="例如：1,10,25 或 2026-05-01,2026-05-25。週六日會自動視為假日。"></textarea>
      <p class="small">可輸入：1,5,10-15。國定假日也支援完整日期，例如 2026-05-01。</p>
    </section>

    <section class="card input-area">
      <h2>2. 新增員工</h2>
      <div class="grid">
        <div><label>員工姓名</label><input type="text" id="empName" placeholder="例如：小明" /></div>
        <div><label>員工類型</label><select id="empType"><option value="fulltime">正職</option><option value="parttime">工讀</option></select></div>
        <div><label>想休日期</label><input type="text" id="empOff" placeholder="例如：1,5,10-15,21-25" /></div>
      </div>
      <button onclick="addEmployee()">新增員工</button>
      <p class="small">日期可輸入單日、多日或範圍，例如：1,5,21-25。</p>
    </section>

    <section class="card input-area">
      <h2>3. 員工清單</h2>
      <div id="employeeList" class="employee-list"></div>
      <div class="actions">
        <button onclick="generateSchedule()">產生班表</button>
        <button class="secondary" onclick="saveData()">儲存資料到瀏覽器</button>
        <button class="secondary" onclick="loadData()">讀取資料</button>
        <button class="danger" onclick="clearAll()">清空資料</button>
      </div>
    </section>

    <section class="card">
      <h2>4. 排班結果</h2>
      <div class="note" style="display:none"></div>
      <div id="summary"></div>
      <div class="actions no-print">
        <button class="secondary" onclick="window.print()">列印 / 另存 PDF</button>
        <button class="secondary" onclick="downloadCSV()">下載 CSV</button>
      </div>
      <div id="scheduleTable"></div>
    </section>
  </main>

  <script>
    let employees = [];
    let latestSchedule = [];

    const today = new Date();
    document.getElementById('monthInput').value = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0');

    function isNumberText(value) {
      return value !== '' && !isNaN(Number(value));
    }

    function parseDays(text, year, month) {
      if (!text || !text.trim()) return [];
      const result = [];
      const parts = text.split(',').map(item => item.trim()).filter(Boolean);

      parts.forEach(item => {
        const dashParts = item.split('-').map(x => x.trim());

        if (dashParts.length === 3 && dashParts.every(isNumberText)) {
          const y = parseInt(dashParts[0], 10);
          const m = parseInt(dashParts[1], 10);
          const d = parseInt(dashParts[2], 10);
          if (y === year && m === month) result.push(d);
        } else if (dashParts.length === 2 && dashParts.every(isNumberText)) {
          const start = parseInt(dashParts[0], 10);
          const end = parseInt(dashParts[1], 10);
          if (start <= end) {
            for (let d = start; d <= end; d++) result.push(d);
          }
        } else if (isNumberText(item)) {
          result.push(parseInt(item, 10));
        }
      });

      return Array.from(new Set(result)).filter(d => d >= 1 && d <= 31);
    }

    function addEmployee() {
      const name = document.getElementById('empName').value.trim();
      const type = document.getElementById('empType').value;
      const offDays = document.getElementById('empOff').value.trim();
      if (!name) { alert('請輸入員工姓名'); return; }
      employees.push({ name, type, offText: offDays });
      document.getElementById('empName').value = '';
      document.getElementById('empOff').value = '';
      renderEmployees();
    }

    function removeEmployee(index) {
      employees.splice(index, 1);
      renderEmployees();
    }

    function updateEmployee(index) {
      const name = document.getElementById('editName' + index).value.trim();
      const type = document.getElementById('editType' + index).value;
      const offText = document.getElementById('editOff' + index).value.trim();
      if (!name) { alert('員工姓名不能空白'); return; }
      employees[index] = { name, type, offText };
      renderEmployees();
      alert('員工資料已更新');
    }

    function renderEmployees() {
      const box = document.getElementById('employeeList');
      if (employees.length === 0) {
        box.innerHTML = '<p class="small">尚未新增員工。</p>';
        return;
      }

      box.innerHTML = employees.map((emp, i) => `
        <div class="employee-item">
          <label>姓名</label>
          <input type="text" id="editName${i}" value="${emp.name}" />
          <label>員工類型</label>
          <select id="editType${i}">
            <option value="fulltime" ${emp.type === 'fulltime' ? 'selected' : ''}>正職</option>
            <option value="parttime" ${emp.type === 'parttime' ? 'selected' : ''}>工讀</option>
          </select>
          <label>想休日期</label>
          <input type="text" id="editOff${i}" value="${emp.offText || ''}" placeholder="例如：1,5,21-25" />
          <button class="secondary" onclick="updateEmployee(${i})">儲存修改</button>
          <button class="danger" onclick="removeEmployee(${i})">刪除</button>
        </div>
      `).join('');
    }

    function isHoliday(date, nationalHolidayDays) {
      const day = date.getDay();
      return day === 0 || day === 6 || nationalHolidayDays.includes(date.getDate());
    }

    function generateSchedule() {
      if (employees.length === 0) { alert('請先新增員工'); return; }

      const monthValue = document.getElementById('monthInput').value;
      const ym = monthValue.split('-').map(Number);
      const year = ym[0];
      const month = ym[1];
      const daysInMonth = new Date(year, month, 0).getDate();
      
      const holidayNeed = 5;
      const fulltimeOffDays = parseInt(document.getElementById('fulltimeOffDays').value, 10);
      const nationalHolidayDays = parseDays(document.getElementById('nationalHolidays').value, year, month);

      const staff = employees.map(emp => ({
        ...emp,
        offDays: parseDays(emp.offText, year, month).filter(d => d <= daysInMonth),
        workDays: 0,
        consecutive: 0,
        assignedDays: []
      }));

      const fulltimers = staff.filter(e => e.type === 'fulltime');
      const parttimers = staff.filter(e => e.type === 'parttime');
      const targetFulltimeWorkDays = daysInMonth - fulltimeOffDays;

      latestSchedule = [];
      const warnings = [];

      fulltimers.forEach(emp => {
        if (emp.offDays.length > fulltimeOffDays) {
          warnings.push('正職 ' + emp.name + ' 指定休假 ' + emp.offDays.length + ' 天，超過設定休假 ' + fulltimeOffDays + ' 天，無法剛好符合。');
        }
      });

      for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month - 1, d);
        const holiday = isHoliday(date, nationalHolidayDays);
        const dow = date.getDay(); // 0日 1一 2二 3三 4四 5五 6六
        let needPeople;
        if (dow === 1) needPeople = 4; // 週一
        else if (dow === 2) needPeople = 2; // 週二
        else if (dow >= 3 && dow <= 5) needPeople = 3; // 週三到週五
        else needPeople = 5; // 週末/假日
        const minPeople = needPeople;
        const maxPeople = needPeople;

        latestSchedule.push({
          day: d,
          weekday: ['日','一','二','三','四','五','六'][date.getDay()],
          holiday,
          needPeople,
          minPeople,
          maxPeople,
          assigned: [],
          off: staff.filter(e => e.offDays.includes(d)).map(e => e.name)
        });
      }

      // 第一階段：先排正職，每個正職必須剛好上 daysInMonth - fulltimeOffDays 天
      for (let d = 1; d <= daysInMonth; d++) {
        const row = latestSchedule[d - 1];
        let availableFulltimers = fulltimers.filter(emp => {
          if (emp.offDays.includes(d)) return false;
          if (emp.workDays >= targetFulltimeWorkDays) return false;
          return true;
        });

        availableFulltimers.sort((a, b) => {
          const offCountA = fulltimers.filter(e => e.offDays.includes(d)).length;
          const offCountB = offCountA;
          if (offCountA !== offCountB) return offCountB - offCountA;
          if (a.consecutive >= 5 && b.consecutive < 5) return 1;
          if (b.consecutive >= 5 && a.consecutive < 5) return -1;
          return a.workDays - b.workDays;
        });

        const remainingNeed = row.needPeople - row.assigned.length;
        const assignedFulltimers = availableFulltimers.slice(0, remainingNeed);

        assignedFulltimers.forEach(emp => {
          emp.workDays++;
          emp.consecutive++;
          emp.assignedDays.push(d);
          row.assigned.push(emp.name);
        });

        fulltimers.forEach(emp => {
          if (!assignedFulltimers.includes(emp)) emp.consecutive = 0;
        });
      }

      fulltimers.forEach(emp => {
        if (emp.workDays < targetFulltimeWorkDays) {
          for (let d = 1; d <= daysInMonth && emp.workDays < targetFulltimeWorkDays; d++) {
            const row = latestSchedule[d - 1];
            if (!emp.offDays.includes(d) && !row.assigned.includes(emp.name) && row.assigned.length < row.needPeople) {
              emp.workDays++;
              emp.assignedDays.push(d);
              row.assigned.push(emp.name);
            }
          }
        }
      });

      fulltimers.forEach(emp => {
        const actualOff = daysInMonth - emp.workDays;
        if (actualOff !== fulltimeOffDays) {
          warnings.push('正職 ' + emp.name + ' 本月休 ' + actualOff + ' 天，未剛好符合設定的 ' + fulltimeOffDays + ' 天。');
        }
      });

      // 第二階段：正職排完後，再用工讀補足每天人數
      for (let d = 1; d <= daysInMonth; d++) {
        const row = latestSchedule[d - 1];
        const needToFill = row.needPeople - row.assigned.length;
        if (needToFill <= 0) continue;

        let availableParttimers = parttimers.filter(emp => !emp.offDays.includes(d));
        availableParttimers.sort((a, b) => {
          const offCount = staff.filter(e => e.offDays.includes(d)).length;
          if (a.workDays < 4 && b.workDays >= 4) return -1;
          if (b.workDays < 4 && a.workDays >= 4) return 1;
          return a.workDays - b.workDays;
        });

        const assignedParttimers = availableParttimers.slice(0, needToFill);
        assignedParttimers.forEach(emp => {
          emp.workDays++;
          emp.assignedDays.push(d);
          row.assigned.push(emp.name);
        });

        if (row.assigned.length < row.minPeople) {
          warnings.push(month + '/' + d + ' 人數不足，最少需要 ' + row.minPeople + ' 人，但只排到 ' + row.assigned.length + ' 人。');
        }
      }

      // 第三階段：假日若不足 5 人，從已排滿 4 人的平日移人過去補
      latestSchedule.forEach(holidayRow => {
        if (!holidayRow.holiday) return;

        while (holidayRow.assigned.length < holidayRow.needPeople) {
          let moved = false;

          const sourceDays = latestSchedule.filter(row => {
            return !row.holiday && row.maxPeople === 4 && row.assigned.length === 4 && row.assigned.length > row.minPeople;
          });

          for (const sourceRow of sourceDays) {
            const candidateName = sourceRow.assigned.find(name => {
              const emp = staff.find(e => e.name === name);
              if (!emp) return false;
              if (holidayRow.assigned.includes(name)) return false;
              if (emp.offDays.includes(holidayRow.day)) return false;
              return true;
            });

            if (candidateName) {
              const emp = staff.find(e => e.name === candidateName);
              sourceRow.assigned = sourceRow.assigned.filter(name => name !== candidateName);
              holidayRow.assigned.push(candidateName);
              emp.assignedDays = emp.assignedDays.filter(day => day !== sourceRow.day);
              emp.assignedDays.push(holidayRow.day);
              emp.assignedDays.sort((a, b) => a - b);
              warnings.push(month + '/' + holidayRow.day + ' 假日人數不足，已從 ' + month + '/' + sourceRow.day + ' 平日移動 ' + candidateName + ' 補班。');
              moved = true;
              break;
            }
          }

          if (!moved) break;
        }
      });

      latestSchedule.forEach(row => {
        if (row.assigned.length < row.minPeople) {
          warnings.push(month + '/' + row.day + ' 人數不足，最少需要 ' + row.minPeople + ' 人，但只排到 ' + row.assigned.length + ' 人。');
        }
      });

      parttimers.forEach(emp => {
        if (emp.workDays < 4) {
          warnings.push('工讀 ' + emp.name + ' 本月只排 ' + emp.workDays + ' 天，少於 4 天。');
        }
      });

      renderSchedule(staff, warnings, year, month);
    }

    function renderSchedule(staff, warnings, year, month) {
      document.getElementById('summary').innerHTML = `
        <h3>${year} 年 ${month} 月員工統計</h3>
        <table>
          <tr><th>姓名</th><th>類型</th><th>上班天數</th><th>上班日期</th><th>休假天數</th><th>指定休假</th></tr>
          ${staff.map(emp => `<tr><td>${emp.name}</td><td>${emp.type === 'fulltime' ? '正職' : '工讀'}</td><td>${emp.workDays}</td><td>${emp.assignedDays.length ? emp.assignedDays.join('、') : '無'}</td><td>${latestSchedule.length - emp.workDays}</td><td>${emp.offText || '無'}</td></tr>`).join('')}
        </table>
        ${warnings.length ? `<div class="note warning"><strong>提醒：</strong><br>${warnings.join('<br>')}</div>` : '<div class="note" style="display:none"></div>'}
      `;

      document.getElementById('scheduleTable').innerHTML = `
        <table>
          <tr><th>日期</th><th>星期</th><th>人數</th><th>上班人員</th><th>休假人員</th></tr>
          ${latestSchedule.map(row => `<tr class="${row.holiday ? 'holiday' : ''}"><td>${month}/${row.day}</td><td>${row.weekday}</td><td>${row.holiday ? '假日' : '平日'}</td><td>${row.needPeople} 人</td><td>${row.assigned.join('、') || '無'}</td><td>${row.off.join('、') || '無'}</td></tr>`).join('')}
        </table>
      `;
    }

    function saveData() {
      localStorage.setItem('shiftEmployees', JSON.stringify(employees));
      localStorage.setItem('shiftMonth', document.getElementById('monthInput').value);
      localStorage.setItem('nationalHolidays', document.getElementById('nationalHolidays').value);
      
            localStorage.setItem('fulltimeOffDays', document.getElementById('fulltimeOffDays').value);
      alert('已儲存到這台電腦的瀏覽器');
    }

    function loadData() {
      employees = JSON.parse(localStorage.getItem('shiftEmployees') || '[]');
      document.getElementById('monthInput').value = localStorage.getItem('shiftMonth') || document.getElementById('monthInput').value;
      document.getElementById('nationalHolidays').value = localStorage.getItem('nationalHolidays') || '';
      
            document.getElementById('fulltimeOffDays').value = localStorage.getItem('fulltimeOffDays') || '8';
      renderEmployees();
    }

    function clearAll() {
      if (!confirm('確定要清空所有員工資料嗎？')) return;
      employees = [];
      latestSchedule = [];
      localStorage.removeItem('shiftEmployees');
      localStorage.removeItem('shiftMonth');
      localStorage.removeItem('nationalHolidays');
      
      
      localStorage.removeItem('fulltimeOffDays');
      renderEmployees();
      document.getElementById('summary').innerHTML = '';
      document.getElementById('scheduleTable').innerHTML = '';
    }

    function downloadCSV() {
      if (!latestSchedule.length) { alert('請先產生班表'); return; }
      let lines = ['日期,星期,類型,需求人數,上班人員,休假人員'];
      latestSchedule.forEach(row => {
        lines.push(row.day + ',星期' + row.weekday + ',' + (row.holiday ? '假日' : '平日') + ',' + row.needPeople + ',"' + row.assigned.join('、') + '","' + row.off.join('、') + '"');
      });
      const blob = new Blob([String.fromCharCode(65279) + lines.join(String.fromCharCode(10))], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = '班表.csv';
      a.click();
      URL.revokeObjectURL(url);
    }

    renderEmployees();
  </script>
</body>
</html>
